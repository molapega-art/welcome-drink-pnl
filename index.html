<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, ComposedChart, Area, Line, LineChart } = Recharts;


const MONTHS = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
const DAYS_RU = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const COLORS = ["#6366f1","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316","#06b6d4","#84cc16","#a855f7","#64748b"];
const n = (v) => v != null ? Number(v) : 0;
const fmt = (v) => v != null ? Number(v).toLocaleString("ru-RU", { maximumFractionDigits: 2 }) : "—";
const fmtG = (v) => v != null ? `${fmt(v)} ₾` : "—";
const fmtP = (v) => v != null ? `${(v * 100).toFixed(2)}%` : "—";

// ════════════════════════════════════════════════
// DATA MODEL — all line items for Welcome Drink
// ════════════════════════════════════════════════
const STRUCTURE = {
  revenue: [
    { key: "revenueTotal", name: "Оборот" },
  ],
  cogs: [
    { key: "foodcost", name: "Себестоимость (фудкост)" },
  ],
  fixCost: [
    { key: "rent", name: "Аренда" },
    { key: "utilities", name: "Коммуналка" },
    { key: "cleaning", name: "Уборка" },
    { key: "ice", name: "Лед" },
    { key: "poster", name: "Poster" },
    { key: "accountant", name: "Бухгалтер" },
    { key: "security", name: "Сигнализация (охрана)" },
    { key: "aroma", name: "Aromaco (ароматизация)" },
  ],
  marketing: [
    { key: "mktYandex", name: "Яндекс реклама" },
    { key: "mktGoogle", name: "Google реклама" },
    { key: "mktTripadvisor", name: "TripAdvisor" },
    { key: "mktInstaTarget", name: "Инстаграм (таргет)" },
    { key: "mktInstaPub", name: "Инстаграм (паблики)" },

  ],
  salaries: [
    { key: "salaryBar", name: "ЗП Бар" },
    { key: "salaryKitchen", name: "ЗП Кухня" },
    { key: "salaryBuyer", name: "Закупщик" },

    { key: "chefPay", name: "Шеф-повар" },
    { key: "barManagerPay", name: "Бар-менеджер" },
    { key: "smmPay", name: "SMM-щик" },
    { key: "musiciansPay", name: "Музыканты" },
    { key: "deliveryCost", name: "Доставка закупки" },
  ],
  writeoffs: [
    { key: "woStaffFood", name: "Стаф-питание" },

    { key: "tax", name: "Налоги" },
  ],
  kitchen: [
    { key: "kitchenRevenue", name: "Оборот кухня" },

  ],
};

// ════════════════════════════════════════════════
// DEMO DATA
// ════════════════════════════════════════════════
const genDemo = () => {
  const base = [28000,26000,32000,35000,42000,48000,52000,50000,45000,38000,33000,40000];
  return base.map((rev, m) => {
    const daysN = new Date(2025, m+1, 0).getDate();
    const days = [];
    for (let d = 1; d <= daysN; d++) {
      const dt = new Date(2025, m, d);
      const dow = dt.getDay();
      const dowIdx = dow === 0 ? 6 : dow - 1;
      const dailyBase = rev / daysN;
      const mult = (dow===5||dow===6) ? 1.6 : dow===0 ? 1.2 : 0.85;
      const dayRev = Math.round(dailyBase * mult * (0.85 + Math.random()*0.3));
      const kitchenShare = 0.18 + Math.random()*0.06;
      const dayKitchenRev = Math.round(dayRev * kitchenShare);
      // Фудкост кухни — часть общего фудкоста, не добавка
      const dayKitchenFc = Math.round(dayKitchenRev * (0.30 + Math.random()*0.06));
      const dayBarFc = Math.round((dayRev - dayKitchenRev) * (0.22 + Math.random()*0.04));
      const dayTotalFc = dayBarFc + dayKitchenFc;
      days.push({
        date: `2025-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
        dow: dowIdx,
        revenue: dayRev,
        kitchenRevenue: dayKitchenRev,
        foodcost: dayTotalFc,
        kitchenFoodcost: dayKitchenFc,
        transactions: Math.round(dayRev / (35 + Math.random()*25)),
      });
    }
    const totRev = days.reduce((s,d) => s+d.revenue, 0);
    const totKitRev = days.reduce((s,d) => s+d.kitchenRevenue, 0);
    const totFc = days.reduce((s,d) => s+d.foodcost, 0);
    const totKitFc = days.reduce((s,d) => s+d.kitchenFoodcost, 0);
    const totTx = days.reduce((s,d) => s+d.transactions, 0);

    const R = (min,max) => Math.round(min + Math.random()*(max-min));

    return {
      month: m, year: 2025, days, totalTransactions: totTx,
      revenueTotal: totRev,
      foodcost: totFc,
      // Fix Cost
      rent: 3500, utilities: R(600,1000), cleaning: R(300,500), ice: R(100,200),
      poster: 150, accountant: 300, security: 120, aroma: 200,
      // Marketing
      mktYandex: R(200,500), mktGoogle: R(150,400), mktTripadvisor: R(50,150),
      mktInstaTarget: R(200,600), mktInstaPub: R(100,300), mktTelegram: R(50,200),
      // Salaries
      salaryBar: R(4000,6000), salaryKitchen: R(1500,2500), salaryBuyer: R(800,1200), salaryTaxi: R(100,300),
      // Management
      chefPay: Math.round(totKitRev * 0.08) + 500,
      barManagerPay: Math.round(totRev * 0.02) + 800,
      smmPay: R(400,800), musiciansPay: R(200,600), deliveryCost: R(150,400),
      // Writeoffs
      woStaffFood: R(200,500), woRnD: R(100,300), woSpoilage: R(50,200), woNoReason: R(0,100),
      woInventory: R(-300, 200),
      // Tax
      tax: R(200,800),
      // Kitchen (kitchenSalary = salaryKitchen, это одна и та же сумма, не дублировать)
      kitchenRevenue: totKitRev, kitchenFoodcost: totKitFc,
    };
  });
};

// ════════════════════════════════════════════════
// COMPUTE P&L
// ════════════════════════════════════════════════
const computePnL = (d) => {
  if (!d) return null;
  const revenue = n(d.revenueTotal);
  const foodcost = n(d.foodcost);
  const grossProfit = revenue - foodcost;

  const sumKeys = (keys) => keys.reduce((s, { key }) => s + n(d[key]), 0);

  const fixTotal = sumKeys(STRUCTURE.fixCost);
  const mktTotal = sumKeys(STRUCTURE.marketing);
  const salTotal = sumKeys(STRUCTURE.salaries);
  const mgmtTotal = sumKeys(STRUCTURE.management);
  const woTotal = sumKeys(STRUCTURE.writeoffs);
  const taxTotal = n(d.tax);

  const totalExpenses = fixTotal + mktTotal + salTotal + mgmtTotal + woTotal;
  const profitBeforeTax = grossProfit - totalExpenses;
  const netProfit = profitBeforeTax - taxTotal;

  // Kitchen (аналитический блок — кухня входит в общий оборот)
  // ЗП кухни = salaryKitchen из блока зарплат (одна сумма, без дублирования)
  const kitRev = n(d.kitchenRevenue);
  const kitFc = n(d.kitchenFoodcost);
  const kitSal = n(d.salaryKitchen);
  const kitProfit = kitRev - kitFc - kitSal;

  // KPI
  const foodcostPct = revenue > 0 ? foodcost / revenue : 0;
  const profitability = revenue > 0 ? netProfit / revenue : 0;
  // ФОТ = все прямые зарплаты (бар + кухня + закупщик + такси + шеф + бар-менеджер)
  // SMM и музыканты — это маркетинг/управление, не ФОТ
  const fotTotal = n(d.salaryBar) + n(d.salaryKitchen) + n(d.salaryBuyer) + n(d.salaryTaxi) + n(d.chefPay) + n(d.barManagerPay);
  const fotPct = revenue > 0 ? fotTotal / revenue : 0;
  // CM: Переменные = фудкост + зарплаты + списания (привязаны к объёму)
  const contributionMargin = revenue - foodcost - salTotal - woTotal;
  const cmPct = revenue > 0 ? contributionMargin / revenue : 0;
  // ТБУ: Постоянные = фикс + маркетинг + управленческие + налоги
  const fixedForBE = fixTotal + mktTotal + mgmtTotal + taxTotal;
  const tbu = cmPct > 0 ? Math.round(fixedForBE / cmPct) : 0;

  return {
    d, revenue, foodcost, grossProfit,
    fixTotal, mktTotal, salTotal, mgmtTotal, woTotal,
    totalExpenses, profitBeforeTax, taxTotal, netProfit,
    kitRev, kitFc, kitSal, kitProfit,
    foodcostPct, profitability, fotTotal, fotPct,
    contributionMargin, cmPct, tbu,
    totalTransactions: n(d.totalTransactions),
    avgCheck: n(d.totalTransactions) > 0 ? Math.round(revenue / n(d.totalTransactions)) : 0,
  };
};

const aggMonths = (arr) => {
  if (!arr.length) return null;
  const result = {};
  const allKeys = [...STRUCTURE.revenue,...STRUCTURE.cogs,...STRUCTURE.fixCost,...STRUCTURE.marketing,...STRUCTURE.salaries,...STRUCTURE.management,...STRUCTURE.writeoffs,...STRUCTURE.tax,...STRUCTURE.kitchen];
  allKeys.forEach(({key}) => { result[key] = arr.reduce((s,m) => s + n(m[key]), 0); });
  result.totalTransactions = arr.reduce((s,m) => s + n(m.totalTransactions), 0);
  return result;
};

const aggDays = (days, monthData) => {
  if (!days.length) return null;
  const totRev = days.reduce((s,d) => s+d.revenue, 0);
  const ratio = monthData.revenueTotal > 0 ? totRev / monthData.revenueTotal : 0;
  const result = { revenueTotal: totRev };
  result.foodcost = days.reduce((s,d) => s+d.foodcost, 0);
  result.kitchenRevenue = days.reduce((s,d) => s+n(d.kitchenRevenue), 0);
  result.kitchenFoodcost = days.reduce((s,d) => s+n(d.kitchenFoodcost), 0);
  result.totalTransactions = days.reduce((s,d) => s+d.transactions, 0);
  // Prorate monthly costs
  const prorate = (key) => Math.round(n(monthData[key]) * ratio);
  [...STRUCTURE.fixCost,...STRUCTURE.marketing,...STRUCTURE.salaries,...STRUCTURE.management,...STRUCTURE.writeoffs,...STRUCTURE.tax].forEach(({key}) => {
    result[key] = prorate(key);
  });
  // salaryKitchen уже прорачен через STRUCTURE.salaries, отдельно не нужно
  return result;
};

// ════════════════════════════════════════════════
// P&L TABLE
// ════════════════════════════════════════════════
function PnLTable({ columns }) {
  if (!columns.length) return null;
  const pnls = columns.map(c => c.pnl);

  const Row = ({ label, values, bold, indent, topBorder, bg, colorAuto }) => (
    <tr className={`${topBorder ? 'border-t-2 border-gray-800' : 'border-b border-gray-100'} ${bg || ''}`}>
      <td className={`py-1.5 pr-4 ${indent ? 'pl-6 text-gray-500' : 'pl-2 text-gray-700'} text-sm whitespace-nowrap ${bold ? 'font-bold text-gray-900' : ''}`}>{label}</td>
      {values.map((v, i) => (
        <td key={i} className={`py-1.5 px-2 text-right text-sm tabular-nums whitespace-nowrap ${bold ? 'font-bold' : ''} ${colorAuto ? (v < 0 ? 'text-red-600 font-semibold' : 'text-gray-900') : 'text-gray-900'}`}>
          {v != null ? fmt(v) : ''}
        </td>
      ))}
    </tr>
  );

  const Section = ({ label, values }) => (
    <tr className="border-t border-gray-300 bg-gray-50">
      <td className="py-2 pl-2 pr-4 text-xs font-bold text-gray-500 uppercase tracking-wider">{label}</td>
      {values.map((v,i) => <td key={i} className="py-2 px-2 text-right text-xs font-bold text-gray-700 tabular-nums">{v != null ? fmt(v) : ''}</td>)}
    </tr>
  );

  const vals = (fn) => pnls.map(p => p ? fn(p) : null);
  const itemVals = (key) => pnls.map(p => p?.d ? n(p.d[key]) : null);

  return (
    <div className="overflow-x-auto">
      <table className="w-full">
        <thead>
          <tr className="border-b-2 border-gray-800">
            <th className="py-2 pl-2 pr-4 text-left text-xs font-bold text-gray-400 uppercase w-52">WELCOME DRINK</th>
            {columns.map((c,i) => <th key={i} className="py-2 px-2 text-right text-sm font-bold text-gray-700 min-w-24">{c.label}</th>)}
          </tr>
        </thead>
        <tbody>
          {/* ── ДОХОДЫ ── */}
          <Section label="Доходы" values={vals(p => p.revenue)} />
          <Row label="Оборот" values={vals(p => p.revenue)} indent />

          {/* ── СЕБЕСТОИМОСТЬ ── */}
          <Row label="Себестоимость (фудкост)" values={vals(p => p.foodcost)} indent />

          {/* ── МАРЖИНАЛЬНАЯ ПРИБЫЛЬ ── */}
          <Row label="Маржинальная прибыль" values={vals(p => p.grossProfit)} bold topBorder bg="bg-indigo-50" colorAuto />

          {/* ── FIX COST ── */}
          <Section label="Постоянные расходы (Fix Cost)" values={vals(p => p.fixTotal)} />
          {STRUCTURE.fixCost.map(item => <Row key={item.key} label={item.name} values={itemVals(item.key)} indent />)}

          {/* ── МАРКЕТИНГ ── */}
          <Section label="Маркетинг" values={vals(p => p.mktTotal)} />
          {STRUCTURE.marketing.map(item => <Row key={item.key} label={item.name} values={itemVals(item.key)} indent />)}

          {/* ── ЗАРПЛАТЫ ── */}
          <Section label="Зарплаты" values={vals(p => p.salTotal)} />
          {STRUCTURE.salaries.map(item => <Row key={item.key} label={item.name} values={itemVals(item.key)} indent />)}

          {/* ── УПРАВЛЕНЧЕСКИЕ ── */}
          <Section label="Управленческие расходы" values={vals(p => p.mgmtTotal)} />
          {STRUCTURE.management.map(item => <Row key={item.key} label={item.name} values={itemVals(item.key)} indent />)}

          {/* ── СПИСАНИЯ ── */}
          <Section label="Списания" values={vals(p => p.woTotal)} />
          {STRUCTURE.writeoffs.map(item => <Row key={item.key} label={item.name} values={itemVals(item.key)} indent colorAuto />)}

          {/* ── ПРИБЫЛЬ ДО НАЛОГОВ ── */}
          <Row label="Прибыль до налогов" values={vals(p => p.profitBeforeTax)} bold topBorder bg="bg-amber-50" colorAuto />

          {/* ── НАЛОГИ ── */}
          <Row label="Налоги" values={vals(p => p.taxTotal)} indent />

          {/* ── ЧИСТАЯ ПРИБЫЛЬ ── */}
          <Row label="ЧИСТАЯ ПРИБЫЛЬ" values={vals(p => p.netProfit)} bold topBorder bg={pnls.some(p=>p&&p.netProfit<0) ? 'bg-red-50' : 'bg-emerald-50'} colorAuto />

          {/* ── KPI ── */}
          <tr className="border-t-2 border-gray-800 bg-gray-900">
            <td colSpan={columns.length+1} className="py-2 pl-2 text-xs font-bold text-white uppercase tracking-wider">KPI</td>
          </tr>
          <Row label="Фудкост %" values={vals(p => +(p.foodcostPct*100).toFixed(2))} bg="bg-gray-50" />
          <Row label="Рентабельность %" values={vals(p => +(p.profitability*100).toFixed(2))} bg="bg-gray-50" colorAuto />
          <Row label="ФОТ %" values={vals(p => +(p.fotPct*100).toFixed(2))} bg="bg-gray-50" />
          <Row label="Contribution Margin" values={vals(p => p.contributionMargin)} bg="bg-gray-50" />
          <Row label="CM %" values={vals(p => +(p.cmPct*100).toFixed(2))} bg="bg-gray-50" />
          <Row label="ТБУ" values={vals(p => p.tbu)} bold bg="bg-gray-50" />

          {/* ── КУХНЯ ── */}
          <tr className="border-t-2 border-gray-800 bg-orange-900">
            <td colSpan={columns.length+1} className="py-2 pl-2 text-xs font-bold text-white uppercase tracking-wider">Кухня (отдельно)</td>
          </tr>
          <Row label="Оборот кухня" values={itemVals('kitchenRevenue')} bg="bg-orange-50" />
          <Row label="Фудкост кухня" values={itemVals('kitchenFoodcost')} bg="bg-orange-50" />
          <Row label="ЗП кухня" values={itemVals('salaryKitchen')} bg="bg-orange-50" />
          <Row label="Прибыль кухня" values={vals(p => p.kitProfit)} bold bg="bg-orange-50" colorAuto />
          <Row label="Фудкост кухня %" values={vals(p => p.kitRev > 0 ? +((p.kitFc/p.kitRev)*100).toFixed(2) : 0)} bg="bg-orange-50" />
        </tbody>
      </table>
    </div>
  );
}

// ════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════
function DashboardTab({ data }) {
  const [periodType, setPeriodType] = useState("year");
  const [selMonth, setSelMonth] = useState(11);
  const [dateFrom, setDateFrom] = useState("2025-01-01");
  const [dateTo, setDateTo] = useState("2025-12-31");

  // Compute data for selected period
  const periodData = useMemo(() => {
    if (periodType === "year") return aggMonths(data);
    if (periodType === "month") return data[selMonth] || null;
    if (periodType === "week") {
      const md = data[selMonth];
      if (!md) return null;
      // Current week (last 7 days of selected month for demo)
      const last7 = md.days.slice(-7);
      return aggDays(last7, md);
    }
    if (periodType === "day") {
      const md = data[selMonth];
      if (!md) return null;
      const lastDay = md.days[md.days.length - 1];
      return aggDays([lastDay], md);
    }
    if (periodType === "custom") {
      const from = new Date(dateFrom);
      const to = new Date(dateTo);
      const allDays = [];
      const monthsUsed = [];
      data.forEach(md => {
        md.days.forEach(d => {
          const dt = new Date(d.date);
          if (dt >= from && dt <= to) {
            allDays.push(d);
            if (!monthsUsed.includes(md.month)) monthsUsed.push(md.month);
          }
        });
      });
      if (allDays.length === 0) return null;
      // Weighted aggregate across months
      const result = { revenueTotal: 0, foodcost: 0, kitchenRevenue: 0, kitchenFoodcost: 0, totalTransactions: 0 };
      allDays.forEach(d => { result.revenueTotal += d.revenue; result.foodcost += d.foodcost; result.kitchenRevenue += n(d.kitchenRevenue); result.kitchenFoodcost += n(d.kitchenFoodcost); result.totalTransactions += d.transactions; });
      // Prorate monthly costs
      const allKeys = [...STRUCTURE.fixCost,...STRUCTURE.marketing,...STRUCTURE.salaries,...STRUCTURE.management,...STRUCTURE.writeoffs,...STRUCTURE.tax];
      allKeys.forEach(({key}) => { result[key] = 0; });
      monthsUsed.forEach(mi => {
        const md = data[mi];
        const mdDaysInRange = allDays.filter(d => { const dm = parseInt(d.date.split('-')[1])-1; return dm === mi; });
        const ratio = md.revenueTotal > 0 ? mdDaysInRange.reduce((s,d)=>s+d.revenue,0) / md.revenueTotal : 0;
        allKeys.forEach(({key}) => { result[key] += Math.round(n(md[key]) * ratio); });
      });
      return result;
    }
    return null;
  }, [data, periodType, selMonth, dateFrom, dateTo]);

  const yp = computePnL(periodData);
  if (!yp) return <p className="text-gray-400 text-center py-8">Нет данных за выбранный период</p>;

  const periodLabel = periodType === "year" ? "2025 год" : periodType === "month" ? `${MONTHS[selMonth]} 2025` : periodType === "week" ? `Неделя (${MONTHS[selMonth]})` : periodType === "day" ? `День (${MONTHS[selMonth]})` : `${dateFrom} — ${dateTo}`;

  const chart = data.map((d,i) => {
    const p = computePnL(d);
    return { name: MONTHS[i], revenue: p.revenue, gross: p.grossProfit, net: p.netProfit, foodcost: p.foodcost };
  });

  const expPie = [
    { name: "Фудкост", value: yp.foodcost },
    { name: "ЗП + Управление", value: yp.salTotal + yp.mgmtTotal },
    { name: "Fix Cost", value: yp.fixTotal },
    { name: "Маркетинг", value: yp.mktTotal },
    { name: "Списания", value: yp.woTotal },
    { name: "Налоги", value: yp.taxTotal },
  ];

  const Card = ({label,value,sub,color}) => {
    const bg = {green:'bg-emerald-50 border-emerald-200',red:'bg-red-50 border-red-200',indigo:'bg-indigo-50 border-indigo-200',amber:'bg-amber-50 border-amber-200',purple:'bg-purple-50 border-purple-200',cyan:'bg-cyan-50 border-cyan-200'};

function PnLTab({ data }) {
  const [view, setView] = useState("months");
  const [selMonth, setSelMonth] = useState(11);

  const monthCols = useMemo(() => data.map((d) => ({label: `${MONTHS[d.month]} '${String(d.year).slice(-2)}`, pnl: computePnL(d)})), [data]);

  const weekCols = useMemo(() => {
    const md = data[selMonth]; if (!md) return [];
    const weeks = []; let buf = []; let wn = 1;
    md.days.forEach((d,i) => {
      buf.push(d);
      if (d.dow === 6 || i === md.days.length - 1) {
        weeks.push({label:`Нед ${wn}`, pnl: computePnL(aggDays(buf, md))});
        buf = []; wn++;
      }
    });
    return weeks;
  }, [data, selMonth]);

  const dayCols = useMemo(() => {
    const md = data[selMonth]; if (!md) return [];
    return md.days.map(d => ({label:`${d.date.split('-')[2]} ${DAYS_RU[d.dow]}`, pnl: computePnL(aggDays([d], md))}));
  }, [data, selMonth]);

  const cols = view==="months" ? monthCols : view==="weeks" ? weekCols : dayCols;

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2 flex-wrap">
        {[["months","Месяцы"],["weeks","Недели"],["days","Дни"]].map(([id,lb]) => (
          <button key={id} onClick={()=>setView(id)} className={`px-4 py-2 rounded-lg text-sm font-medium ${view===id?'bg-indigo-600 text-white':'bg-white border text-gray-600 hover:bg-gray-50'}`}>{lb}</button>
        ))}
        {view !== "months" && <select value={selMonth} onChange={e=>setSelMonth(Number(e.target.value))} className="ml-auto border rounded px-3 py-2 text-sm">{data.map((md,i) => <option key={i} value={i}>{MONTHS[md.month]} {md.year}</option>)}</select>}
      </div>
      <div className="bg-white rounded-xl border p-4"><PnLTable columns={cols} /></div>
    </div>
  );
}

function DayOfWeekTab({ data }) {
  const [periodType, setPeriodType] = useState("year");
  const [selMonth, setSelMonth] = useState(0);
  const [dateFrom, setDateFrom] = useState("2025-01-01");
  const [dateTo, setDateTo] = useState("2025-12-31");

  // Collect all days from selected period (no useMemo - direct calc)
  let allDays = [];
  let refMonth = data[0];

  if (periodType === "year") {
    data.forEach(md => { if (md && md.days) md.days.forEach(d => allDays.push(d)); });
  } else if (periodType === "month") {
    const md = data[selMonth];
    if (md && md.days) { allDays = md.days; refMonth = md; }
  } else if (periodType === "quarter") {
    const qStart = Math.floor(selMonth / 3) * 3;
    for (let i = qStart; i < qStart + 3 && i < data.length; i++) {
      if (data[i] && data[i].days) data[i].days.forEach(d => allDays.push(d));
    }
    refMonth = data[qStart] || data[0];
  } else if (periodType === "custom") {
    const from = new Date(dateFrom);
    const to = new Date(dateTo);
    data.forEach(md => {
      if (md && md.days) md.days.forEach(d => {
        const dt = new Date(d.date);
        if (dt >= from && dt <= to) allDays.push(d);
      });
    });
  }

  const periodLabel = periodType === "year" ? "2025 год" : periodType === "month" ? `${MONTHS[selMonth]} 2025` : periodType === "quarter" ? `Q${Math.floor(selMonth/3)+1} 2025` : `${dateFrom} — ${dateTo}`;

  // Group by day of week
  const buckets = [[], [], [], [], [], [], []];
  allDays.forEach(d => { if (d.dow >= 0 && d.dow < 7) buckets[d.dow].push(d); });

  const dowCols = DAYS_RU.map((name, i) => {
    const days = buckets[i];
    if (!days.length) return null;
    const avgRev = Math.round(days.reduce((s,d) => s + d.revenue, 0) / days.length);
    const avgFc = Math.round(days.reduce((s,d) => s + d.foodcost, 0) / days.length);
    const avgKitRev = Math.round(days.reduce((s,d) => s + n(d.kitchenRevenue), 0) / days.length);
    const avgKitFc = Math.round(days.reduce((s,d) => s + n(d.kitchenFoodcost), 0) / days.length);
    const avgTx = Math.round(days.reduce((s,d) => s + d.transactions, 0) / days.length);
    const dayShare = 1 / 30;
    const result = { revenueTotal: avgRev, foodcost: avgFc, kitchenRevenue: avgKitRev, kitchenFoodcost: avgKitFc, totalTransactions: avgTx };
    [...STRUCTURE.fixCost, ...STRUCTURE.marketing, ...STRUCTURE.salaries, ...STRUCTURE.management, ...STRUCTURE.writeoffs, ...STRUCTURE.tax].forEach(({ key }) => {
      result[key] = Math.round(n(refMonth[key]) * dayShare);
    });
    // salaryKitchen уже прорачен через STRUCTURE.salaries
    return { label: `${name} (ср.)`, pnl: computePnL(result), count: days.length, avgRev };
  }).filter(Boolean);

  const chartData = dowCols.map(c => ({ name: c.label.replace(' (ср.)', ''), revenue: c.pnl.revenue, profit: c.pnl.netProfit, foodcost: c.pnl.foodcost }));

  const best = dowCols.length > 0 ? dowCols.reduce((a, b) => a.avgRev > b.avgRev ? a : b) : {};
  const worst = dowCols.length > 0 ? dowCols.reduce((a, b) => a.avgRev < b.avgRev ? a : b) : {};

  return (
    <div className="space-y-4">
      {/* Period selector */}
      <div className="bg-white rounded-xl border p-4 flex items-center gap-2 flex-wrap">
        <span className="text-sm text-gray-500 font-medium mr-1">Период:</span>
        {[["year","Год"],["quarter","Квартал"],["month","Месяц"],["custom","Даты"]].map(([id,lb])=>(
          <button key={id} onClick={()=>setPeriodType(id)} className={`px-3 py-1.5 rounded-lg text-sm font-medium ${periodType===id?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{lb}</button>
        ))}
        {(periodType === "month" || periodType === "quarter") && (
          <select value={selMonth} onChange={e=>setSelMonth(Number(e.target.value))} className="border rounded px-3 py-1.5 text-sm ml-2">
            {periodType === "month"
              ? MONTHS.map((m,i)=><option key={i} value={i}>{m} 2025</option>)
              : [0,3,6,9].map(q=><option key={q} value={q}>Q{q/3+1} 2025</option>)
            }
          </select>
        )}
        {periodType === "custom" && (
          <div className="flex items-center gap-2 ml-2">
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="border rounded px-2 py-1.5 text-sm" />
            <span className="text-gray-400">—</span>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="border rounded px-2 py-1.5 text-sm" />
          </div>
        )}
        <span className="ml-auto text-sm font-semibold text-indigo-600">{periodLabel}</span>
      </div>

      {/* Quick stats */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div className="rounded-xl border p-4 bg-emerald-50 border-emerald-200">
          <div className="text-xs text-gray-500 uppercase">Лучший день</div>
          <div className="text-xl font-bold text-emerald-700 mt-1">{best.label?.replace(' (ср.)','') || '—'} — {fmtG(best.avgRev)}</div>
          <div className="text-xs text-gray-500">{best.count || 0} дней в выборке</div>
        </div>
        <div className="rounded-xl border p-4 bg-red-50 border-red-200">
          <div className="text-xs text-gray-500 uppercase">Слабый день</div>
          <div className="text-xl font-bold text-red-700 mt-1">{worst.label?.replace(' (ср.)','') || '—'} — {fmtG(worst.avgRev)}</div>
          <div className="text-xs text-gray-500">{worst.count || 0} дней в выборке</div>
        </div>
        <div className="rounded-xl border p-4 bg-indigo-50 border-indigo-200">
          <div className="text-xs text-gray-500 uppercase">Разница</div>
          <div className="text-xl font-bold text-indigo-700 mt-1">{fmtG((best.avgRev||0)-(worst.avgRev||0))}</div>
          <div className="text-xs text-gray-500">{(best.avgRev||1) > 0 && (worst.avgRev||1) > 0 ? `x${((best.avgRev||1)/(worst.avgRev||1)).toFixed(1)}` : ''}</div>
        </div>
      </div>

      <div className="bg-white rounded-xl border p-6">
        <h3 className="text-sm font-semibold text-gray-500 uppercase mb-4">Средние показатели по дням недели — {periodLabel}</h3>
        <ResponsiveContainer width="100%" height={280}>
          <ComposedChart data={chartData}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
            <XAxis dataKey="name" /><YAxis tickFormatter={v=>`${(v/1000).toFixed(0)}k`} />
            <Tooltip formatter={v=>fmtG(v)} /><Legend />
            <Bar dataKey="revenue" fill="#6366f1" name="Выручка" radius={[4,4,0,0]} />
            <Bar dataKey="foodcost" fill="#ef4444" name="Фудкост" radius={[4,4,0,0]} />
            <Line type="monotone" dataKey="profit" stroke="#10b981" strokeWidth={3} name="Чистая прибыль" dot={{fill:"#10b981"}} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
      <div className="bg-white rounded-xl border p-4"><PnLTable columns={dowCols} /></div>
    </div>
  );
}

function ForecastTab({ data }) {
  const [base, setBase] = useState(11);
  const [showTax, setShowTax] = useState(false);
  const [p, setP] = useState({rev:0,cogs:0,fix:0,sal:0,mkt:0,months:6});
  const [tx, setTx] = useState({vat:18,salTax:0,rentTax:0});

  const bp = computePnL(data[base]);
  if (!bp) return null;

  const forecast = [];
  for (let i = 0; i < p.months; i++) {
    const g = Math.pow(1+p.rev/100,i+1);
    const d = {...data[base]};
    d.revenueTotal = Math.round(bp.revenue * g);
    d.foodcost = Math.round(bp.foodcost * g * (1+p.cogs/100));
    STRUCTURE.fixCost.forEach(({key})=>{d[key]=Math.round(n(data[base][key])*(1+p.fix/100));});
    STRUCTURE.salaries.forEach(({key})=>{d[key]=Math.round(n(data[base][key])*(1+p.sal/100));});
    STRUCTURE.management.forEach(({key})=>{d[key]=Math.round(n(data[base][key])*(1+p.sal/100));});
    STRUCTURE.marketing.forEach(({key})=>{d[key]=Math.round(n(data[base][key])*(1+p.mkt/100));});
    if (showTax) d.tax = Math.round(d.revenueTotal*tx.vat/100)+tx.salTax+tx.rentTax;
    d.kitchenRevenue = Math.round(n(data[base].kitchenRevenue)*g);
    d.kitchenFoodcost = Math.round(n(data[base].kitchenFoodcost)*g*(1+p.cogs/100));
    // salaryKitchen уже обновлён через STRUCTURE.salaries
    forecast.push({label:`М+${i+1}`, pnl: computePnL(d)});
  }

  const Sl = ({label,value,onChange,min,max,step=1,suffix="%"}) => (
    <div className="flex items-center gap-3">
      <span className="text-sm text-gray-600 w-48">{label}</span>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))} className="flex-1 accent-indigo-600" />
      <span className={`text-sm font-bold w-16 text-right ${value>0?'text-emerald-600':value<0?'text-red-600':'text-gray-600'}`}>{value>0?'+':''}{value}{suffix}</span>
    </div>
  );

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl border p-6">
        <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
          <h3 className="text-lg font-semibold">Прогнозирование</h3>
          <div className="flex items-center gap-4">
            <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={showTax} onChange={e=>setShowTax(e.target.checked)} className="w-4 h-4 accent-indigo-600" /><span className="text-sm text-gray-600">Учитывать налоги</span></label>
            <select value={base} onChange={e=>setBase(Number(e.target.value))} className="border rounded px-3 py-1.5 text-sm">{MONTHS.map((m,i)=><option key={i} value={i}>{m} 2025</option>)}</select>
          </div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          {[["Базовая выручка",fmtG(bp.revenue),"indigo"],["ТБУ",fmtG(bp.tbu),"amber"],["Запас прочности",fmtG(bp.revenue-bp.tbu),bp.revenue>bp.tbu?"green":"red"],["Рентабельность",fmtP(bp.profitability),"purple"]].map(([l,v,c],i)=>(
            <div key={i} className={`rounded-xl border p-3 bg-${c==='green'?'emerald':c}-50 border-${c==='green'?'emerald':c}-200`}><div className="text-xs text-gray-500">{l}</div><div className={`text-lg font-bold text-${c==='green'?'emerald':c}-700`}>{v}</div></div>
          ))}
        </div>
        <div className="space-y-3 bg-gray-50 rounded-lg p-4 mb-4">
          <Sl label="Рост выручки / мес" value={p.rev} onChange={v=>setP({...p,rev:v})} min={-20} max={30} />
          <Sl label="Изменение фудкоста" value={p.cogs} onChange={v=>setP({...p,cogs:v})} min={-20} max={30} />
          <Sl label="Изменение Fix Cost" value={p.fix} onChange={v=>setP({...p,fix:v})} min={-30} max={30} />
          <Sl label="Изменение ЗП" value={p.sal} onChange={v=>setP({...p,sal:v})} min={-20} max={30} />
          <Sl label="Изменение маркетинга" value={p.mkt} onChange={v=>setP({...p,mkt:v})} min={-50} max={50} />
          <Sl label="Кол-во месяцев" value={p.months} onChange={v=>setP({...p,months:v})} min={1} max={12} step={1} suffix="" />
        </div>
        {showTax && (
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-4">
            <h4 className="text-sm font-semibold text-amber-700 mb-3">Налоговая нагрузка</h4>
            <div className="grid grid-cols-3 gap-3">
              <div><label className="text-xs text-gray-500 block mb-1">НДС %</label><input type="number" value={tx.vat} onChange={e=>setTx({...tx,vat:Number(e.target.value)})} className="border rounded px-3 py-2 w-full" /></div>

              <div><label className="text-xs text-gray-500 block mb-1">Налог с аренды ₾/мес</label><input type="number" value={tx.rentTax} onChange={e=>setTx({...tx,rentTax:Number(e.target.value)})} className="border rounded px-3 py-2 w-full" /></div>
            </div>
          </div>
        )}
      </div>
      <div className="bg-white rounded-xl border p-4"><PnLTable columns={forecast} /></div>
      <div className="bg-white rounded-xl border p-6">
        <ResponsiveContainer width="100%" height={280}>
          <ComposedChart data={forecast.map(f=>({name:f.label,revenue:f.pnl.revenue,gross:f.pnl.grossProfit,net:f.pnl.netProfit}))}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
            <XAxis dataKey="name" /><YAxis tickFormatter={v=>`${(v/1000).toFixed(0)}k`} />
            <Tooltip formatter={v=>fmtG(v)} /><Legend />
            <Bar dataKey="revenue" fill="#6366f1" name="Выручка" radius={[4,4,0,0]} />
            <Bar dataKey="gross" fill="#f59e0b" name="Марж. прибыль" radius={[4,4,0,0]} />
            <Line type="monotone" dataKey="net" stroke="#10b981" strokeWidth={3} name="Чистая прибыль" dot={{fill:"#10b981"}} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

// ПОСТОЯННЫЕ РАСХОДЫ — ввод и управление
// ════════════════════════════════════════════════
function FixedCostsTab({ data, onUpdateMonth }) {
  const [selMonth, setSelMonth] = useState(new Date().getMonth());
  const [editing, setEditing] = useState(null); // key being edited
  const [confirmed, setConfirmed] = useState({});

  // Only truly FIXED costs belong here — same amount every month
  const editGroups = [
    { label: "ПОСТОЯННЫЕ РАСХОДЫ (FIX COST)", items: STRUCTURE.fixCost, color: "indigo" },
  ];

  const md = data[selMonth];
  if (!md) return null;

  const [localValues, setLocalValues] = useState({});

  // Initialize local values from data when month changes
  const getVal = (key) => localValues[`${selMonth}:${key}`] != null ? localValues[`${selMonth}:${key}`] : n(md[key]);
  const setVal = (key, val) => setLocalValues(prev => ({...prev, [`${selMonth}:${key}`]: Number(val)}));

  const isConfirmed = (key) => confirmed[`${selMonth}:${key}`] === true;
  const toggleConfirm = (key) => setConfirmed(prev => ({...prev, [`${selMonth}:${key}`]: !prev[`${selMonth}:${key}`]}));

  const allItems = editGroups.flatMap(g => g.items);
  const totalConfirmed = allItems.filter(item => isConfirmed(item.key)).length;
  const totalItems = allItems.length;
  const allDone = totalConfirmed === totalItems;

  const confirmAll = () => {
    const next = {...confirmed};
    allItems.forEach(item => { next[`${selMonth}:${item.key}`] = true; });
    setConfirmed(next);
  };

  const totalExpenses = allItems.reduce((s, item) => s + getVal(item.key), 0);

  return (
    <div className="space-y-4">
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
        Здесь вводятся только фиксированные расходы — суммы, которые одинаковые каждый месяц (аренда, Poster и т.д.).
        Введите сумму за месяц → она автоматически разнесётся на недели и дни пропорционально выручке.
        Подтверждение (✓) = сумма зафиксирована и применена к текущему и всем будущим месяцам.
        Остальные расходы (маркетинг, зарплаты, списания и т.д.) вводятся во вкладке «Расходы» — они меняются каждый месяц.
      </div>

      <div className="bg-white rounded-xl border p-4 flex items-center gap-4 flex-wrap">
        <select value={selMonth} onChange={e=>setSelMonth(Number(e.target.value))} className="border rounded px-3 py-2 text-sm font-medium">
          {MONTHS.map((m,i)=><option key={i} value={i}>{m} 2025</option>)}
        </select>
        <div className="flex items-center gap-2">
          <div className={`w-3 h-3 rounded-full ${allDone ? 'bg-emerald-500' : 'bg-amber-400'}`}></div>
          <span className="text-sm text-gray-600">Подтверждено: {totalConfirmed} / {totalItems}</span>
        </div>
        {!allDone && <button onClick={confirmAll} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700 ml-auto">Подтвердить все</button>}
        {allDone && <span className="ml-auto text-emerald-600 text-sm font-semibold">Все данные подтверждены</span>}
        <div className="text-sm font-bold text-gray-700">Итого: {fmtG(totalExpenses)}</div>
      </div>

      {editGroups.map((group, gi) => (
        <div key={gi} className="bg-white rounded-xl border overflow-hidden">
          <div className={`px-4 py-2 bg-gray-50 border-b`}>
            <h3 className="text-xs font-bold text-gray-500 uppercase tracking-wider">{group.label}</h3>
          </div>
          <table className="w-full text-sm">
            <thead><tr className="border-b text-left text-gray-400 text-xs">
              <th className="py-2 pl-4 pr-2 w-8"></th>
              <th className="py-2 pr-4">Статья</th>
              <th className="py-2 pr-4 text-right w-36">Сумма (₾/мес)</th>
              <th className="py-2 pr-4 text-right w-28">За день</th>
              <th className="py-2 pr-4 w-20"></th>
            </tr></thead>
            <tbody>
              {group.items.map(item => {
                const val = getVal(item.key);
                const daysInMonth = new Date(2025, selMonth+1, 0).getDate();
                const perDay = Math.round(val / daysInMonth);
                const conf = isConfirmed(item.key);
                const isEdit = editing === item.key;
                return (
                  <tr key={item.key} className={`border-b ${conf ? 'bg-emerald-50' : ''} hover:bg-gray-50`}>
                    <td className="py-2 pl-4 pr-2">
                      <button onClick={()=>toggleConfirm(item.key)} className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs ${conf ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-gray-300 text-transparent hover:border-gray-400'}`}>
                        {conf ? '✓' : ''}
                      </button>
                    </td>
                    <td className="py-2 pr-4 font-medium text-gray-700">{item.name}</td>
                    <td className="py-2 pr-4 text-right">
                      {isEdit ? (
                        <input type="number" value={val} onChange={e=>setVal(item.key, e.target.value)} onBlur={()=>setEditing(null)} onKeyDown={e=>e.key==='Enter'&&setEditing(null)} autoFocus className="border rounded px-2 py-1 w-28 text-right text-sm" />
                      ) : (
                        <span className={`cursor-pointer hover:underline ${val === 0 ? 'text-gray-300' : 'text-gray-900 font-medium'}`} onClick={()=>setEditing(item.key)}>
                          {fmt(val)}
                        </span>
                      )}
                    </td>
                    <td className="py-2 pr-4 text-right text-gray-400">{fmt(perDay)}</td>
                    <td className="py-2 pr-4 text-right">
                      <button onClick={()=>setEditing(isEdit ? null : item.key)} className="text-indigo-500 hover:text-indigo-700 text-xs">
                        {isEdit ? '✓' : '✎'}
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      ))}

      <div className="bg-white rounded-xl border p-4 flex items-center justify-between">
        <div>
          <span className="text-sm text-gray-500">Итого расходов за {MONTHS[selMonth]}:</span>
          <span className="text-lg font-bold text-gray-900 ml-2">{fmtG(totalExpenses)}</span>
        </div>
        <div className="text-sm text-gray-400">
          Выручка: {fmtG(md.revenueTotal)} | Баланс: <span className={md.revenueTotal - totalExpenses - n(md.foodcost) >= 0 ? 'text-emerald-600' : 'text-red-600'}>{fmtG(md.revenueTotal - n(md.foodcost) - totalExpenses)}</span>
        </div>
      </div>
    </div>
  );
}

// ДДС — Движение Денежных Средств
// ════════════════════════════════════════════════
function DDSTab({ data, isEditor, editPassword, onReload, realDDS = [], useRealDDS = false, filterMonth, setFilterMonth }) {
  const [filterType, setFilterType] = useState("all"); // all, income, expense
  const [filterCat, setFilterCat] = useState("all");
  const [search, setSearch] = useState("");
  const [hiddenIds, setHiddenIds] = useState({}); // {monthIdx: Set of hidden ids}
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState({});
  const [edits, setEdits] = useState({}); // {monthIdx: {id: {category, desc, amount}}}
  const [deletingId, setDeletingId] = useState(null);

  // Quick-add form (only for editors)
  const [qaOpen, setQaOpen] = useState(false);
  const [qaDate, setQaDate] = useState(new Date().toISOString().slice(0,10));
  const [qaType, setQaType] = useState("expense");
  const [qaBlock, setQaBlock] = useState("fixCost");
  const [qaItem, setQaItem] = useState("rent");
  const [qaAmount, setQaAmount] = useState("");
  const [qaDesc, setQaDesc] = useState("");
  const [qaSubmitting, setQaSubmitting] = useState(false);
  const [qaMessage, setQaMessage] = useState(null);

  const blockOptions = Object.entries(STRUCTURE).filter(([k]) => k !== "kitchen" && k !== "revenue");
  const itemOptions = (STRUCTURE[qaBlock] || []).map(it => ({ key: it.key, name: it.name }));

  const handleQuickAdd = async () => {
    if (!qaAmount || isNaN(Number(qaAmount))) { setQaMessage({ type: "error", text: "Укажи сумму" }); return; }
    const item = itemOptions.find(i => i.key === qaItem);
    if (!item) { setQaMessage({ type: "error", text: "Выбери категорию" }); return; }
    const blockName = {
      fixCost: "Постоянные расходы", marketing: "Маркетинг", salaries: "Зарплаты",
      management: "Управленческие", household: "Хозяйственные расходы", writeoffs: "Списания", tax: "Налоги",
    }[qaBlock] || qaBlock;
    setQaSubmitting(true);
    setQaMessage(null);
    try {
      await addDDSEntry(editPassword, {
        date: qaDate,
        type: qaType,
        category: blockName,
        subcategory: item.name,
        description: qaDesc,
        amount: Number(qaAmount),
      });
      setQaMessage({ type: "success", text: "Добавлено ✓" });
      setQaAmount(""); setQaDesc("");
      if (onReload) setTimeout(onReload, 500);
    } catch (e) {
      setQaMessage({ type: "error", text: e.message });
    } finally {
      setQaSubmitting(false);
    }
  };

  const toggleHide = (id) => {
    setHiddenIds(prev => {
      const monthSet = new Set(prev[filterMonth] || []);
      if (monthSet.has(id)) monthSet.delete(id); else monthSet.add(id);
      return { ...prev, [filterMonth]: monthSet };
    });
  };

  const startEdit = (t) => {
    setEditingId(t.id);
    setEditDraft({ category: t.category, desc: t.desc, amount: t.amount });
  };

  const saveEdit = (id) => {
    setEdits(prev => ({
      ...prev,
      [filterMonth]: { ...(prev[filterMonth] || {}), [id]: { ...editDraft } }
    }));
    setEditingId(null);
  };

  const cancelEdit = () => { setEditingId(null); setEditDraft({}); };

  const isHidden = (id) => hiddenIds[filterMonth] && hiddenIds[filterMonth].has(id);
  const getEdited = (t) => {
    const e = edits[filterMonth] && edits[filterMonth][t.id];
    return e ? { ...t, ...e } : t;
  };

  // Generate all transactions from monthly data
  const allTransactions = useMemo(() => {
    // If using real DDS records from Sheets — return those directly, filtered to current month.
    // Skip records marked hidden=yes in the sheet (they're archived, not shown).
    if (useRealDDS) {
      const md = data[filterMonth];
      if (!md) return [];
      const prefix = `${md.year}-${String(md.month + 1).padStart(2, '0')}`;
      return realDDS
        .filter(r => r.date && r.date.startsWith(prefix) && !r.hidden)
        .map(r => ({
          id: r.id,
          date: r.date,
          type: r.type === "income" ? "income" : "expense",
          source: "Google Sheets",
          category: r.subcategory || r.category || "—",
          desc: r.description || r.category || "",
          amount: Number(r.amount) || 0,
          hidden: false,
        }));
    }
    const md = data[filterMonth];
    if (!md) return [];
    const txs = [];
    let idCounter = 1;

    // INCOME: daily revenue from Poster
    md.days.forEach(day => {
      const avg = day.transactions > 0 ? Math.round(day.revenue / day.transactions) : 0;
      txs.push({
        id: idCounter++, date: day.date, type: "income", source: "Poster",
        category: "Выручка", desc: `Выручка за день (${day.transactions} чеков, ср.чек ${avg} ₾)`,
        amount: day.revenue,
      });
    });

    // EXPENSE: foodcost daily (Poster)
    md.days.forEach(day => {
      txs.push({
        id: idCounter++, date: day.date, type: "expense", source: "Poster",
        category: "Фудкост", desc: "Себестоимость проданного",
        amount: day.foodcost,
      });
    });

    // EXPENSE: monthly items — spread across month on specific dates
    const mStr = `2025-${String(filterMonth+1).padStart(2,'0')}`;
    const addExpense = (day, cat, desc, amount, source="Ручной ввод") => {
      if (amount === 0) return;
      txs.push({ id: idCounter++, date: `${mStr}-${String(day).padStart(2,'0')}`, type: "expense", source, category: cat, desc, amount: Math.abs(amount) });
    };
    const addAdjust = (day, cat, desc, amount) => {
      if (amount === 0) return;
      txs.push({ id: idCounter++, date: `${mStr}-${String(day).padStart(2,'0')}`, type: amount > 0 ? "income" : "expense", source: "Инвентаризация", category: cat, desc: `${desc} ${amount > 0 ? '(излишек)' : '(недостача)'}`, amount: Math.abs(amount) });
    };

    // Fix Cost
    addExpense(1, "Аренда", "Аренда помещения", md.rent);
    addExpense(5, "Коммуналка", "Оплата коммунальных услуг", md.utilities);
    addExpense(3, "Уборка", "Услуги уборки", md.cleaning);
    addExpense(2, "Лед", "Закупка льда", md.ice, "Poster");
    addExpense(1, "Poster", "Подписка Poster POS", md.poster);
    addExpense(10, "Бухгалтер", "Бухгалтерские услуги", md.accountant);
    addExpense(1, "Охрана", "Сигнализация", md.security);
    addExpense(1, "Ароматизация", "Aromaco", md.aroma);

    // Marketing (spread across month)
    addExpense(5, "Маркетинг", "Яндекс реклама", md.mktYandex);
    addExpense(5, "Маркетинг", "Google реклама", md.mktGoogle);
    addExpense(10, "Маркетинг", "TripAdvisor", md.mktTripadvisor);
    addExpense(8, "Маркетинг", "Инстаграм (таргет)", md.mktInstaTarget);
    addExpense(15, "Маркетинг", "Инстаграм (паблики)", md.mktInstaPub);
    addExpense(15, "Маркетинг", "Телеграм (паблики)", md.mktTelegram);

    // Salaries (end of month)
    const lastDay = new Date(2025, filterMonth+1, 0).getDate();
    addExpense(lastDay, "ЗП", "ЗП Бар", md.salaryBar, "Google Sheets");
    addExpense(lastDay, "ЗП", "ЗП Кухня", md.salaryKitchen, "Google Sheets");
    addExpense(lastDay, "ЗП", "Закупщик", md.salaryBuyer, "Google Sheets");
    addExpense(15, "ЗП", "Такси (персонал)", md.salaryTaxi);

    // Management
    addExpense(lastDay, "Управление", "Шеф-повар", md.chefPay);
    addExpense(lastDay, "Управление", "Бар-менеджер", md.barManagerPay);
    addExpense(lastDay, "Управление", "SMM-щик", md.smmPay);
    addExpense(20, "Управление", "Музыканты", md.musiciansPay);
    addExpense(12, "Управление", "Доставка закупки", md.deliveryCost);

    // Writeoffs
    addExpense(lastDay, "Списания", "Стаф-питание", md.woStaffFood, "Poster");
    addExpense(lastDay, "Списания", "Проработка", md.woRnD, "Poster");
    addExpense(lastDay, "Списания", "Порча", md.woSpoilage, "Poster");
    if (md.woNoReason > 0) addExpense(lastDay, "Списания", "Без причины", md.woNoReason, "Poster");
    addAdjust(lastDay, "Списания", "Инвентаризация", md.woInventory);

    // Tax
    if (md.tax > 0) addExpense(20, "Налоги", "Налоговый платёж", md.tax);

    // Sort by date
    txs.sort((a,b) => a.date.localeCompare(b.date));
    return txs;
  }, [data, filterMonth]);

  // Categories for filter
  const categories = useMemo(() => {
    const cats = new Set(allTransactions.map(t => t.category));
    return ["all", ...Array.from(cats).sort()];
  }, [allTransactions]);

  // Apply edits, then filter (hidden rows stay visible but marked)
  const filtered = useMemo(() => {
    return allTransactions.map(t => getEdited(t)).filter(t => {
      if (filterType !== "all" && t.type !== filterType) return false;
      if (filterCat !== "all" && t.category !== filterCat) return false;
      if (search && !t.desc.toLowerCase().includes(search.toLowerCase()) && !t.category.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }, [allTransactions, filterType, filterCat, search, edits, filterMonth]);

  // Totals (hidden rows excluded from calculations — respects both local and sheet-side hidden)
  const visible = filtered.filter(t => !isHidden(t.id) && !t.hidden);
  const hiddenCount = filtered.length - visible.length;
  const totalIncome = visible.filter(t => t.type === "income").reduce((s,t) => s+t.amount, 0);
  const totalExpense = visible.filter(t => t.type === "expense").reduce((s,t) => s+t.amount, 0);
  const balance = totalIncome - totalExpense;

  // Summary by category
  const byCat = useMemo(() => {
    const map = {};
    filtered.forEach(t => {
      const key = `${t.type}:${t.category}`;
      if (!map[key]) map[key] = { type: t.type, category: t.category, total: 0, count: 0 };
      map[key].total += t.amount;
      map[key].count++;
    });
    return Object.values(map).sort((a,b) => b.total - a.total);
  }, [filtered]);

  // Source badge color
  const srcColor = (s) => s === "Poster" ? "bg-blue-100 text-blue-700" : s === "Google Sheets" ? "bg-green-100 text-green-700" : s === "Инвентаризация" ? "bg-purple-100 text-purple-700" : "bg-gray-100 text-gray-600";

  const currentMd = data[filterMonth];
  const periodLabel = currentMd ? `${MONTHS[currentMd.month]} ${currentMd.year}` : "—";
  const shortPeriodLabel = currentMd ? `${MONTHS[currentMd.month]} ${String(currentMd.year).slice(-2)}` : "—";

  const handleDelete = async (id) => {
    if (!isEditor) return;
    if (!window.confirm("Удалить запись из таблицы? Это действие необратимо.")) return;
    setDeletingId(id);
    try {
      await gsWriteAction("deleteDDS", editPassword, { id });
      if (onReload) setTimeout(onReload, 300);
    } catch (e) {
      alert("Ошибка удаления: " + e.message);
    } finally {
      setDeletingId(null);
    }
  };

  return (
    <div className="space-y-4">
      {/* Summary cards */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div className="rounded-xl border p-4 bg-emerald-50 border-emerald-200">
          <div className="text-xs text-gray-500 uppercase">Доходы</div>
          <div className="text-xl font-bold text-emerald-700 mt-1">{fmtG(totalIncome)}</div>
          <div className="text-xs text-gray-500">{filtered.filter(t=>t.type==="income").length} транзакций</div>
        </div>
        <div className="rounded-xl border p-4 bg-red-50 border-red-200">
          <div className="text-xs text-gray-500 uppercase">Расходы</div>
          <div className="text-xl font-bold text-red-700 mt-1">{fmtG(totalExpense)}</div>
          <div className="text-xs text-gray-500">{filtered.filter(t=>t.type==="expense").length} транзакций</div>
        </div>
        <div className={`rounded-xl border p-4 ${balance >= 0 ? 'bg-indigo-50 border-indigo-200' : 'bg-red-50 border-red-200'}`}>
          <div className="text-xs text-gray-500 uppercase">Баланс</div>
          <div className={`text-xl font-bold mt-1 ${balance >= 0 ? 'text-indigo-700' : 'text-red-700'}`}>{fmtG(balance)}</div>
          <div className="text-xs text-gray-500">{periodLabel}</div>
        </div>
      </div>

      {/* Quick-add form (editors only) */}
      {isEditor && (
        <div className="bg-white rounded-xl border border-indigo-200 p-4 space-y-3">
          <div className="flex items-center justify-between">
            <h3 className="font-semibold text-gray-800 flex items-center gap-2">
              <span className="text-indigo-600">+</span> Добавить запись в ДДС
            </h3>
            <button onClick={() => setQaOpen(!qaOpen)} className="text-xs text-gray-500 hover:text-gray-700">
              {qaOpen ? "Свернуть" : "Развернуть"}
            </button>
          </div>
          {qaOpen && (
            <div className="space-y-3">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                <input type="date" value={qaDate} onChange={e => setQaDate(e.target.value)}
                  className="border rounded px-2 py-1.5 text-sm" />
                <select value={qaType} onChange={e => setQaType(e.target.value)}
                  className="border rounded px-2 py-1.5 text-sm">
                  <option value="expense">Расход</option>
                  <option value="income">Доход</option>
                </select>
                <select value={qaBlock} onChange={e => { setQaBlock(e.target.value); const first = STRUCTURE[e.target.value]?.[0]; if (first) setQaItem(first.key); }}
                  className="border rounded px-2 py-1.5 text-sm">
                  {blockOptions.map(([k]) => {
                    const name = { fixCost:"Постоянные расходы", marketing:"Маркетинг", salaries:"Зарплаты", management:"Управленческие", household:"Хозяйственные", writeoffs:"Списания", tax:"Налоги", cogs:"Себестоимость" }[k] || k;
                    return <option key={k} value={k}>{name}</option>;
                  })}
                </select>
                <select value={qaItem} onChange={e => setQaItem(e.target.value)}
                  className="border rounded px-2 py-1.5 text-sm">
                  {itemOptions.map(it => <option key={it.key} value={it.key}>{it.name}</option>)}
                </select>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                <input type="number" placeholder="Сумма" value={qaAmount} onChange={e => setQaAmount(e.target.value)}
                  className="border rounded px-2 py-1.5 text-sm" />
                <input type="text" placeholder="Описание (необязательно)" value={qaDesc} onChange={e => setQaDesc(e.target.value)}
                  className="border rounded px-2 py-1.5 text-sm md:col-span-2" />
                <button onClick={handleQuickAdd} disabled={qaSubmitting}
                  className="px-3 py-1.5 bg-indigo-600 text-white rounded text-sm font-medium hover:bg-indigo-700 disabled:opacity-50">
                  {qaSubmitting ? "Сохранение…" : "Добавить"}
                </button>
              </div>
              {qaMessage && (
                <div className={`text-sm px-3 py-2 rounded ${qaMessage.type === "error" ? "bg-red-50 text-red-700" : "bg-green-50 text-green-700"}`}>
                  {qaMessage.text}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Filters */}
      <div className="bg-white rounded-xl border p-4">
        <div className="flex gap-2 flex-wrap items-center">
          <select value={filterMonth} onChange={e=>setFilterMonth(Number(e.target.value))} className="border rounded px-3 py-2 text-sm">
            {data.map((md, i) => <option key={i} value={i}>{MONTHS[md.month]} {md.year}</option>)}
          </select>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="border rounded px-3 py-2 text-sm">
            <option value="all">Все операции</option>
            <option value="income">Только доходы</option>
            <option value="expense">Только расходы</option>
          </select>
          <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="border rounded px-3 py-2 text-sm">
            <option value="all">Все категории</option>
            {categories.filter(c=>c!=="all").map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <input placeholder="Поиск по описанию..." value={search} onChange={e=>setSearch(e.target.value)} className="border rounded px-3 py-2 text-sm flex-1 min-w-48" />
          <span className="text-sm text-gray-500 ml-auto">{filtered.length} записей{hiddenCount > 0 ? ` (${hiddenCount} скрыто)` : ''}</span>
        </div>
      </div>

      {/* Summary by category */}
      <div className="bg-white rounded-xl border p-4">
        <h3 className="text-sm font-semibold text-gray-500 uppercase mb-3">Итого по категориям</h3>
        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
          {byCat.map((c,i) => (
            <div key={i} className={`p-2 rounded-lg border text-sm ${c.type==='income' ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`}>
              <div className="font-medium text-gray-700 truncate">{c.category}</div>
              <div className={`font-bold ${c.type==='income' ? 'text-emerald-700' : 'text-red-700'}`}>{fmtG(c.total)}</div>
              <div className="text-xs text-gray-400">{c.count} шт</div>
            </div>
          ))}
        </div>
      </div>

      {/* Transactions table */}
      <div className="bg-white rounded-xl border p-4">
        <h3 className="text-sm font-semibold text-gray-500 uppercase mb-3">Все транзакции — {periodLabel}</h3>
        <div className="overflow-x-auto max-h-96 overflow-y-auto">
          <table className="w-full text-sm">
            <thead className="sticky top-0 bg-white">
              <tr className="border-b-2 border-gray-300 text-left text-xs text-gray-500 uppercase">
                <th className="pb-2 pr-2">Дата</th>
                <th className="pb-2 pr-2">Тип</th>
                <th className="pb-2 pr-2">Категория</th>
                <th className="pb-2 pr-2">Описание</th>
                <th className="pb-2 pr-2">Источник</th>
                <th className="pb-2 text-right pr-2">Сумма</th>
                <th className="pb-2 text-center w-20"></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(t => {
                const hidden = isHidden(t.id);
                const isEditing = editingId === t.id;
                return (
                <tr key={t.id} className={`border-b border-gray-50 hover:bg-gray-50 ${hidden ? 'opacity-40 bg-gray-50' : ''}`}>
                  <td className="py-1.5 pr-2 text-gray-500 whitespace-nowrap">{t.date.split('-').slice(1).join('.')}</td>
                  <td className="py-1.5 pr-2">
                    <span className={`px-1.5 py-0.5 rounded text-xs font-medium ${t.type==='income' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                      {t.type === 'income' ? '+' : '−'}
                    </span>
                  </td>
                  <td className="py-1.5 pr-2 font-medium text-gray-700 whitespace-nowrap">
                    {isEditing
                      ? <select value={editDraft.category} onChange={e => setEditDraft({...editDraft, category: e.target.value})} className="border rounded px-1 py-0.5 text-sm">
                          {categories.filter(c => c !== "all").map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      : t.category}
                  </td>
                  <td className="py-1.5 pr-2 text-gray-600">
                    {isEditing
                      ? <input value={editDraft.desc} onChange={e => setEditDraft({...editDraft, desc: e.target.value})} className="border rounded px-1 py-0.5 text-sm w-full" />
                      : t.desc}
                  </td>
                  <td className="py-1.5 pr-2"><span className={`px-1.5 py-0.5 rounded text-xs ${srcColor(t.source)}`}>{t.source}</span></td>
                  <td className={`py-1.5 text-right font-medium tabular-nums whitespace-nowrap pr-2 ${t.type==='income' ? 'text-emerald-700' : 'text-red-700'}`}>
                    {isEditing
                      ? <input type="number" value={editDraft.amount} onChange={e => setEditDraft({...editDraft, amount: Number(e.target.value)})} className="border rounded px-1 py-0.5 text-sm w-24 text-right" />
                      : <>{t.type === 'income' ? '+' : '−'}{fmt(t.amount)} ₾</>}
                  </td>
                  <td className="py-1.5 text-center whitespace-nowrap">
                    {isEditing ? (
                      <div className="flex gap-1 justify-center">
                        <button onClick={() => saveEdit(t.id)} className="px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded text-xs hover:bg-emerald-200">✓</button>
                        <button onClick={cancelEdit} className="px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded text-xs hover:bg-gray-200">✕</button>
                      </div>
                    ) : (
                      <div className="flex gap-1 justify-center">
                        <button onClick={() => startEdit(t)} className="px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded text-xs hover:bg-gray-200" title="Редактировать">✎</button>
                        <button onClick={() => toggleHide(t.id)} className={`px-1.5 py-0.5 rounded text-xs ${hidden ? 'bg-amber-100 text-amber-700 hover:bg-amber-200' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title={hidden ? "Показать" : "Скрыть"}>
                          {hidden ? '◉' : '◎'}
                        </button>
                        {isEditor && useRealDDS && (
                          <button onClick={() => handleDelete(t.id)} disabled={deletingId === t.id}
                            className="px-1.5 py-0.5 bg-red-50 text-red-600 rounded text-xs hover:bg-red-100 disabled:opacity-50" title="Удалить из таблицы">
                            {deletingId === t.id ? '…' : '🗑'}
                          </button>
                        )}
                      </div>
                    )}
                  </td>
                </tr>);
              })}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-gray-800 font-bold">
                <td colSpan={5} className="py-2 text-gray-700">Итого ({periodLabel})</td>
                <td className={`py-2 text-right tabular-nums ${balance >= 0 ? 'text-emerald-700' : 'text-red-700'}`}>
                  {balance >= 0 ? '+' : '−'}{fmt(Math.abs(balance))} ₾
                </td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════
// SETTINGS TAB
// ════════════════════════════════════════════════
function SettingsTab({ blocks, onUpdateBlocks }) {
  const [editingItem, setEditingItem] = useState(null); // {blockId, itemIdx}
  const [draft, setDraft] = useState("");
  const [newItemBlock, setNewItemBlock] = useState(null);
  const [newItemKey, setNewItemKey] = useState("");
  const [newItemName, setNewItemName] = useState("");
  const [editBlockName, setEditBlockName] = useState(null);
  const [blockDraft, setBlockDraft] = useState("");

  const typeLabels = { fixed: "Постоянные", variable: "Переменные" };
  const typeColors = { fixed: "bg-indigo-100 text-indigo-700", variable: "bg-amber-100 text-amber-700" };

  const renameItem = (blockId, itemIdx) => {
    if (!draft.trim()) return;
    onUpdateBlocks(blocks.map(b => {
      if (b.id !== blockId) return b;
      const items = [...b.items];
      items[itemIdx] = { ...items[itemIdx], name: draft.trim() };
      return { ...b, items };
    }));
    setEditingItem(null);
    setDraft("");
  };

  const removeItem = (blockId, itemIdx) => {
    onUpdateBlocks(blocks.map(b => {
      if (b.id !== blockId) return b;
      return { ...b, items: b.items.filter((_, i) => i !== itemIdx) };
    }));
  };

  const moveItem = (fromBlockId, itemIdx, toBlockId) => {
    let movedItem = null;
    const updated = blocks.map(b => {
      if (b.id === fromBlockId) {
        movedItem = b.items[itemIdx];
        return { ...b, items: b.items.filter((_, i) => i !== itemIdx) };
      }
      return b;
    });
    if (!movedItem) return;
    onUpdateBlocks(updated.map(b => {
      if (b.id === toBlockId) return { ...b, items: [...b.items, movedItem] };
      return b;
    }));
  };

  const addItem = (blockId) => {
    if (!newItemName.trim()) return;
    const key = newItemKey.trim() || newItemName.trim().toLowerCase().replace(/[^a-zа-я0-9]/gi, '_');
    onUpdateBlocks(blocks.map(b => {
      if (b.id !== blockId) return b;
      return { ...b, items: [...b.items, { key, name: newItemName.trim() }] };
    }));
    setNewItemBlock(null);
    setNewItemKey("");
    setNewItemName("");
  };

  const toggleBlockType = (blockId) => {
    onUpdateBlocks(blocks.map(b => {
      if (b.id !== blockId) return b;
      return { ...b, type: b.type === "fixed" ? "variable" : "fixed" };
    }));
  };

  const renameBlock = (blockId) => {
    if (!blockDraft.trim()) return;
    onUpdateBlocks(blocks.map(b => {
      if (b.id !== blockId) return b;
      return { ...b, name: blockDraft.trim() };
    }));
    setEditBlockName(null);
    setBlockDraft("");
  };

  return (
    <div className="space-y-4">
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-800">
        Здесь можно переименовать категории, переместить между блоками, изменить тип блока (постоянные / переменные) или добавить новые статьи расходов.
      </div>

      {blocks.map(block => (
        <div key={block.id} className="bg-white rounded-xl border overflow-hidden">
          <div className="px-4 py-3 bg-gray-50 border-b flex items-center gap-2 flex-wrap">
            {editBlockName === block.id ? (
              <div className="flex items-center gap-2">
                <input value={blockDraft} onChange={e => setBlockDraft(e.target.value)} onKeyDown={e => e.key === 'Enter' && renameBlock(block.id)} className="border rounded px-2 py-1 text-sm font-bold" autoFocus />
                <button onClick={() => renameBlock(block.id)} className="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs">✓</button>
                <button onClick={() => setEditBlockName(null)} className="px-2 py-1 bg-gray-100 text-gray-500 rounded text-xs">✕</button>
              </div>
            ) : (
              <h3 className="text-sm font-bold text-gray-700 cursor-pointer hover:text-indigo-600" onClick={() => { setEditBlockName(block.id); setBlockDraft(block.name); }}>
                {block.name}
              </h3>
            )}
            <button onClick={() => toggleBlockType(block.id)} className={`px-2 py-0.5 rounded text-xs font-medium ${typeColors[block.type]}`}>
              {typeLabels[block.type]}
            </button>
            <span className="text-xs text-gray-400 ml-auto">{block.items.length} статей</span>
          </div>
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b text-left text-xs text-gray-400">
                <th className="py-2 pl-4 pr-2 w-8">#</th>
                <th className="py-2 pr-4">Название</th>
                <th className="py-2 pr-4 w-32">Ключ</th>
                <th className="py-2 pr-4 w-40">Переместить в</th>
                <th className="py-2 pr-4 w-20 text-center">Действия</th>
              </tr>
            </thead>
            <tbody>
              {block.items.map((item, idx) => (
                <tr key={item.key} className="border-b border-gray-50 hover:bg-gray-50">
                  <td className="py-1.5 pl-4 pr-2 text-gray-400">{idx + 1}</td>
                  <td className="py-1.5 pr-4">
                    {editingItem && editingItem.blockId === block.id && editingItem.itemIdx === idx ? (
                      <div className="flex items-center gap-1">
                        <input value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => e.key === 'Enter' && renameItem(block.id, idx)} className="border rounded px-2 py-0.5 text-sm flex-1" autoFocus />
                        <button onClick={() => renameItem(block.id, idx)} className="px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded text-xs">✓</button>
                        <button onClick={() => setEditingItem(null)} className="px-1.5 py-0.5 bg-gray-100 text-gray-500 rounded text-xs">✕</button>
                      </div>
                    ) : (
                      <span className="text-gray-700 font-medium cursor-pointer hover:text-indigo-600" onClick={() => { setEditingItem({ blockId: block.id, itemIdx: idx }); setDraft(item.name); }}>
                        {item.name}
                      </span>
                    )}
                  </td>
                  <td className="py-1.5 pr-4 text-gray-400 text-xs font-mono">{item.key}</td>
                  <td className="py-1.5 pr-4">
                    <select defaultValue="" onChange={e => { if (e.target.value) moveItem(block.id, idx, e.target.value); e.target.value = ""; }} className="border rounded px-1 py-0.5 text-xs text-gray-500 w-full">
                      <option value="" disabled>Переместить...</option>
                      {blocks.filter(b => b.id !== block.id).map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                    </select>
                  </td>
                  <td className="py-1.5 pr-4 text-center">
                    <button onClick={() => removeItem(block.id, idx)} className="px-1.5 py-0.5 bg-red-50 text-red-500 rounded text-xs hover:bg-red-100" title="Удалить">✕</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {newItemBlock === block.id ? (
            <div className="px-4 py-2 border-t bg-gray-50 flex items-center gap-2">
              <input placeholder="Название статьи" value={newItemName} onChange={e => setNewItemName(e.target.value)} className="border rounded px-2 py-1 text-sm flex-1" autoFocus />
              <input placeholder="Ключ (авто)" value={newItemKey} onChange={e => setNewItemKey(e.target.value)} className="border rounded px-2 py-1 text-sm w-32 font-mono text-xs" />
              <button onClick={() => addItem(block.id)} className="px-3 py-1 bg-emerald-600 text-white rounded text-xs hover:bg-emerald-700">Добавить</button>
              <button onClick={() => setNewItemBlock(null)} className="px-3 py-1 bg-gray-200 text-gray-600 rounded text-xs">Отмена</button>
            </div>
          ) : (
            <div className="px-4 py-2 border-t">
              <button onClick={() => setNewItemBlock(block.id)} className="text-xs text-indigo-600 hover:text-indigo-800 font-medium">+ Добавить статью</button>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// Write helpers — POST to Apps Script with password
async function gsWriteAction(action, password, data = {}) {
  const body = JSON.stringify({ action, password, ...data });
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    // text/plain avoids CORS preflight
    body,
  });
  if (!res.ok) throw new Error(`Network error: ${res.status}`);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "Unknown error");
  return json;
}

async function gsRead(spreadsheetId, range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(range)}?key=${GOOGLE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Sheets API ${res.status}: ${text.slice(0, 200)}`);
  }
  return (await res.json()).values || [];
}

function parseMonthlySheet(rows) {
  // Expected structure: row 1 header = [key, Статья, 2025-01, 2025-02, ...]
  // Column A = API key, Column B = Russian label, Columns C+ = months
  if (!rows || rows.length < 2) return {};
  const header = rows[0];
  const data = {};
  for (let c = 2; c < header.length; c++) {
    const monthLabel = header[c];
    if (!monthLabel) continue;
    const monthData = {};
    for (let r = 1; r < rows.length; r++) {
      const key = rows[r][0];
      if (key && !FORMULA_KEYS.has(key)) {
        const val = rows[r][c];
        monthData[key] = val !== undefined && val !== "" ? Number(val) : 0;
      }
    }
    data[monthLabel] = monthData;
  }
  return data;
}

function parseDailySheet(rows) {
  if (!rows || rows.length < 2) return [];
  const header = rows[0];
  return rows.slice(1).filter(r => r[0]).map(r => {
    const obj = {};
    header.forEach((h, i) => { obj[h] = r[i] || ""; });
    return obj;
  });
}

// Parse DDS sheet: skip header-ish rows, return transactions
function parseDDSSheet(rows) {
  if (!rows || rows.length < 2) return [];
  const result = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row || !row[1]) continue;
    const dateVal = String(row[1]).trim();
    if (!/^\d{4}-\d{2}-\d{2}/.test(dateVal)) continue;
    const hiddenRaw = (row[7] || "").toString().toLowerCase();
    result.push({
      id: row[0],
      date: dateVal,
      type: (row[2] || "").toString().trim(),
      category: (row[3] || "").toString().trim(),
      subcategory: (row[4] || "").toString().trim(),
      description: row[5] || "",
      amount: Number(row[6]) || 0,
      hidden: hiddenRaw === "yes" || hiddenRaw === "да" || hiddenRaw === "true",
    });
  }
  return result;
}

// Full data fetch from a public sheet via API Key. Returns { appData, ddsRecords, stats }.
async function fetchSheetsData(sheetId) {
  const rows = await gsRead(sheetId, "Monthly!A1:AN60");
  const parsed = parseMonthlySheet(rows);
  let dailyRows = [];
  try {
    const dRows = await gsRead(sheetId, "Daily!A1:H1000");
    dailyRows = parseDailySheet(dRows);
  } catch (_) {}
  let ddsRecords = [];
  try {
    const ddsRows = await gsRead(sheetId, "DDS!A1:H5000");
    ddsRecords = parseDDSSheet(ddsRows);
  } catch (_) {}
  const ddsAgg = aggregateDDSByMonth(ddsRecords);
  for (const m in ddsAgg) {
    parsed[m] = parsed[m] || {};
    for (const k in ddsAgg[m]) {
      parsed[m][k] = (Number(parsed[m][k]) || 0) + ddsAgg[m][k];
    }
  }
  const appData = transformSheetsToData(parsed, dailyRows);
  return {
    appData,
    ddsRecords,
    stats: { months: appData.length, daily: dailyRows.length, dds: ddsRecords.length }
  };
}

// Aggregate DDS records into { "YYYY-MM": { key: amount, ... } }
function aggregateDDSByMonth(ddsRecords) {
  const agg = {};
  for (const rec of ddsRecords) {
    if (rec.hidden) continue;
    if (!rec.date) continue;
    const monthLabel = rec.date.slice(0, 7);
    const key = NAME_TO_KEY[rec.subcategory];
    if (!key) continue;
    agg[monthLabel] = agg[monthLabel] || {};
    agg[monthLabel][key] = (agg[monthLabel][key] || 0) + Number(rec.amount);
  }
  return agg;
}

// Transform monthly sheet data into the app's data shape:
// an array of month objects with days[], revenueTotal, foodcost, etc.
function transformSheetsToData(parsed, dailyRows) {
  const result = [];
  const sortedMonths = Object.keys(parsed).sort();
  // Optional daily data indexed by date
  const dailyIdx = {};
  if (Array.isArray(dailyRows)) {
    for (const d of dailyRows) {
      if (d.date) dailyIdx[d.date] = d;
    }
  }
  for (const monthLabel of sortedMonths) {
    const [year, mm] = monthLabel.split('-').map(Number);
    const monthIdx = mm - 1;
    const md = parsed[monthLabel];
    const daysN = new Date(year, monthIdx + 1, 0).getDate();
    const revenueTotal = Number(md.revenueTotal) || 0;
    const foodcost = Number(md.foodcost) || 0;
    const kitchenRevenue = Number(md.kitchenRevenue) || 0;
    const kitchenFoodcost = Number(md.kitchenFoodcost) || 0;
    // Build per-day distribution using day-of-week weighting when we don't have real daily data
    const weights = [];
    let totalWeight = 0;
    for (let d = 1; d <= daysN; d++) {
      const dow = new Date(year, monthIdx, d).getDay();
      const mult = (dow === 5 || dow === 6) ? 1.6 : dow === 0 ? 1.2 : 0.85;
      weights.push(mult);
      totalWeight += mult;
    }
    const days = [];
    for (let d = 1; d <= daysN; d++) {
      const dt = new Date(year, monthIdx, d);
      const dow = dt.getDay();
      const dowIdx = dow === 0 ? 6 : dow - 1;
      const dateStr = `${year}-${String(mm).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const realDay = dailyIdx[dateStr];
      if (realDay) {
        days.push({
          date: dateStr,
          dow: dowIdx,
          revenue: Number(realDay.revenueTotal) || 0,
          kitchenRevenue: Number(realDay.kitchenRevenue) || 0,
          foodcost: Number(realDay.foodcost) || 0,
          kitchenFoodcost: Number(realDay.kitchenFoodcost) || 0,
          transactions: Number(realDay.transactions) || 0,
        });
      } else {
        const share = totalWeight > 0 ? (weights[d - 1] / totalWeight) : (1 / daysN);
        days.push({
          date: dateStr,
          dow: dowIdx,
          revenue: Math.round(revenueTotal * share),
          kitchenRevenue: Math.round(kitchenRevenue * share),
          foodcost: Math.round(foodcost * share),
          kitchenFoodcost: Math.round(kitchenFoodcost * share),
          transactions: 0,
        });
      }
    }
    const totalTransactions = days.reduce((s, d) => s + (d.transactions || 0), 0);
    result.push({
      ...md,
      month: monthIdx,
      year,
      days,
      totalTransactions,
      revenueTotal, foodcost, kitchenRevenue, kitchenFoodcost,
    });
  }
  return result;
}

// Simple login modal for edit access
function LoginModal({ onLogin, onClose, error }) {
  const [password, setPassword] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [localError, setLocalError] = useState(null);

  const handleSubmit = async () => {
    if (!password.trim()) { setLocalError("Введите пароль"); return; }
    setSubmitting(true);
    setLocalError(null);
    try {
      // Verify password: send an unknown action. Server first validates password, then returns
      // "Неизвестное действие: ping" if pw correct, or "Неверный пароль" if not.
      await gsWriteAction("ping", password).catch(e => {
        const msg = String(e.message);
        // Correct password: server got past password check and rejected unknown action
        if (msg.includes("Неизвестное действие") || msg.includes("Unknown action")) return { ok: true };
        throw e;
      });
      onLogin(password);
    } catch (e) {
      setLocalError(e.message || "Ошибка");
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-xl p-6 w-full max-w-sm space-y-4" onClick={(e) => e.stopPropagation()}>
        <div>
          <h3 className="text-lg font-bold text-gray-900">🔒 Вход для редактирования</h3>
          <p className="text-sm text-gray-500 mt-1">Введите пароль чтобы редактировать данные</p>
        </div>
        <input type="password" value={password} onChange={e => setPassword(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") handleSubmit(); }}
          placeholder="Пароль" autoFocus
          className="w-full border rounded-lg px-3 py-2 text-sm" />
        {(localError || error) && <div className="text-sm text-red-600">{localError || error}</div>}
        <div className="flex gap-2 justify-end">
          <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Отмена</button>
          <button onClick={handleSubmit} disabled={submitting}
            className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50">
            {submitting ? "Проверка…" : "Войти"}
          </button>
        </div>
      </div>
    </div>
  );
}
